<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Transfer Portal</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f4f4f6;
    --text: #1c1c1e;
    --text2: #6b6b70;
    --text3: #a0a0a5;
    --border: #e3e3e6;
    --accent: #4f6bff;
    --red: #ff3b30;
    --green: #34c759;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg2: #1c1c1e;
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #6b6b70;
      --border: #2c2c2e;
      --accent: #7b8fff;
      --red: #ff453a;
      --green: #30d158;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app { max-width: 560px; margin: 0 auto; padding: 0 16px calc(24px + env(safe-area-inset-bottom)); }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(20px + env(safe-area-inset-top)) 0 16px;
  }
  .header h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.2px; }
  .icon-btn {
    width: 36px; height: 36px; border: none; background: none; color: var(--text2);
    display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%;
  }
  .icon-btn:hover { background: var(--bg2); color: var(--text); }

  .dropzone {
    position: relative; border-radius: 12px;
    padding: 36px 16px; text-align: center; cursor: pointer;
    color: var(--text2); transition: background 0.15s;
  }
  .dropzone .dz-icon { display: block; margin: 0 auto 10px; color: var(--text3); }
  .dropzone .dz-title { font-size: 15px; font-weight: 500; color: var(--text); }
  .dropzone.dragover { background: var(--bg2); }
  .dropzone.disabled { opacity: 0.5; cursor: not-allowed; }
  .dropzone-border { position: absolute; inset: 0; pointer-events: none; }
  .dz-border-rect {
    fill: none; stroke: var(--border); stroke-width: 5;
    stroke-dasharray: 16 10; stroke-linecap: round; transition: stroke 0.15s;
  }
  .dropzone.dragover .dz-border-rect { stroke: var(--accent); }

  .status-line {
    min-height: 20px; font-size: 13px; color: var(--text2); padding: 10px 2px 0; text-align: center;
  }
  .status-line.error { color: var(--red); }

  .queue-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 2px 8px;
  }
  .queue-header .label {
    font-size: 12px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text2);
  }
  .header-controls { display: flex; align-items: center; gap: 16px; }
  .text-btn {
    border: none; background: none; color: var(--text2);
    font-size: 12px; font-weight: 500; cursor: pointer; padding: 4px 2px;
  }
  .text-btn:hover { color: var(--red); }
  .text-btn:disabled { opacity: 0.5; cursor: default; color: var(--text2); }
  .mini-icon-btn {
    border: none; background: none; color: var(--text2); padding: 0;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer;
  }
  .mini-icon-btn:hover { color: var(--text); background: var(--bg2); }
  .mini-icon-btn:disabled { opacity: 0.5; cursor: default; }
  .mini-icon-btn.restore:hover { color: var(--green); background: var(--bg2); }
  .refresh-btn {
    display: flex; align-items: center; gap: 5px; border: none; background: none;
    color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; padding: 4px 2px;
  }
  .refresh-btn:hover { color: var(--text); }
  .refresh-btn svg.spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .file-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  }
  .file-icon { flex: 0 0 auto; color: var(--text3); }
  .file-info { flex: 1 1 auto; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 500; color: var(--text); overflow-wrap: anywhere; }
  .file-size { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .file-actions { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .download-btn {
    flex: 0 0 auto; border: none; background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: 8px; cursor: pointer;
    width: var(--download-btn-width, auto); text-align: center;
  }
  .download-btn:disabled { opacity: 0.6; cursor: default; }
  .download-btn.confirm-delete { background: var(--text3); }
  .delete-btn {
    flex: 0 0 auto; border: none; background: none; color: var(--text3);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer;
  }
  .delete-btn:hover { color: var(--red); background: var(--bg); }
  .delete-btn:disabled { opacity: 0.5; cursor: default; }
  .delete-btn.restore:hover { color: var(--green); background: var(--bg); }

  .empty-state { color: var(--text3); font-size: 14px; padding: 30px 20px; text-align: center; }

  [hidden] { display: none !important; }

  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 20; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 21;
    background: var(--bg); border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
    max-width: 560px; margin: 0 auto;
  }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .sheet-header button { border: none; background: none; font-size: 16px; cursor: pointer; padding: 6px; color: var(--text2); }
  .sheet-title { font-size: 15px; font-weight: 600; }
  .sheet-header-spacer { width: 28px; display: inline-block; }
  .sheet label { display: block; font-size: 13px; color: var(--text2); margin: 10px 0 4px; }
  .sheet input[type="text"], .sheet input[type="password"] {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; font-size: 14px; background: var(--bg2); color: var(--text);
  }
  .sheet-note { font-size: 12px; color: var(--text3); margin-top: 10px; line-height: 1.4; }
  .sheet-actions { display: flex; gap: 8px; margin-top: 16px; }
  .sheet-actions button {
    flex: 1; padding: 11px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  #settingsSave { background: var(--accent); color: #fff; }
  #settingsCancel { background: var(--bg2); color: var(--text2); }
  .sync-note { font-size: 12px; margin-top: 10px; }
  .sync-note.error { color: var(--red); }
  .sync-note.ok { color: var(--text2); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Transfer Portal</h1>
    <button class="icon-btn" id="settingsBtn" aria-label="Sync Setup" title="Sync Setup">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 13.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Drag file here or click to choose">
    <svg class="dropzone-border" width="100%" height="100%">
      <rect class="dz-border-rect" style="x:2.5px; y:2.5px; width:calc(100% - 5px); height:calc(100% - 5px);" rx="12" ry="12"/>
    </svg>
    <svg class="dz-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div class="dz-title">Drag file here or click to choose</div>
  </div>
  <input type="file" id="fileInput" hidden>

  <div class="status-line" id="statusLine"></div>

  <div class="queue-header">
    <span class="label" id="queueLabel">Waiting</span>
    <div class="header-controls">
      <button class="refresh-btn" id="refreshBtn">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Ctrl-F5 to refresh
      </button>
      <button class="text-btn" id="deleteAllBtn" hidden>Delete all</button>
      <button class="mini-icon-btn restore" id="deleteAllCancelBtn" hidden aria-label="Cancel delete all" title="Cancel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 14 4 9l5-5"/>
          <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="queueList"></div>
</div>

<div class="backdrop" id="backdrop" hidden></div>

<div class="sheet" id="settingsSheet" hidden>
  <div class="sheet-header">
    <span class="sheet-header-spacer"></span>
    <span class="sheet-title">Sync Setup</span>
    <button id="settingsClose">&#10005;</button>
  </div>
  <label>GitHub owner</label>
  <input type="text" id="ghOwner" placeholder="e.g. RonSIll">
  <label>Data repo name</label>
  <input type="text" id="ghRepo" placeholder="transfer-portal-data">
  <label>Personal access token</label>
  <input type="password" id="ghPat" placeholder="github_pat_...">
  <div class="sheet-note">Fine-grained PAT scoped to the data repo only, with Contents: Read and write.</div>
  <div class="sheet-actions">
    <button id="settingsCancel">Cancel</button>
    <button id="settingsSave">Save &amp; Sync</button>
  </div>
  <div class="sync-note" id="syncNote"></div>
</div>

<script>
(function () {
  "use strict";

  var MAX_BYTES = 10 * 1024 * 1024;
  var FILES_DIR = "files";
  var GH_CONFIG_KEY = "transferPortalGithubConfig";
  var PENDING_DELETE_KEY = "transferPortalPendingDelete";
  var API_VERSION = "2022-11-28";

  var state = {
    gh: null, // { owner, repo, pat }
    files: [], // [{ name, path, sha, size }]
    loading: false
  };

  var pendingDelete = {}; // path -> true, while a row is armed for delete
  var pendingOrder = []; // paths in the order they were armed, bottom-of-list order

  var el = {
    dropzone: document.getElementById("dropzone"),
    fileInput: document.getElementById("fileInput"),
    statusLine: document.getElementById("statusLine"),
    queueList: document.getElementById("queueList"),
    queueLabel: document.getElementById("queueLabel"),
    deleteAllBtn: document.getElementById("deleteAllBtn"),
    deleteAllCancelBtn: document.getElementById("deleteAllCancelBtn"),
    refreshBtn: document.getElementById("refreshBtn"),
    refreshIcon: document.getElementById("refreshIcon"),
    settingsBtn: document.getElementById("settingsBtn"),
    settingsSheet: document.getElementById("settingsSheet"),
    settingsClose: document.getElementById("settingsClose"),
    settingsCancel: document.getElementById("settingsCancel"),
    settingsSave: document.getElementById("settingsSave"),
    backdrop: document.getElementById("backdrop"),
    ghOwner: document.getElementById("ghOwner"),
    ghRepo: document.getElementById("ghRepo"),
    ghPat: document.getElementById("ghPat"),
    syncNote: document.getElementById("syncNote")
  };

  // ---------- Config persistence ----------
  function loadConfig() {
    try {
      var raw = localStorage.getItem(GH_CONFIG_KEY);
      state.gh = raw ? JSON.parse(raw) : null;
    } catch (e) { state.gh = null; }
  }
  function saveConfig() {
    localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(state.gh));
  }

  function loadPendingDelete() {
    try {
      var raw = localStorage.getItem(PENDING_DELETE_KEY);
      pendingOrder = raw ? JSON.parse(raw) : [];
    } catch (e) { pendingOrder = []; }
    pendingDelete = {};
    pendingOrder.forEach(function (p) { pendingDelete[p] = true; });
  }
  function savePendingDelete() {
    localStorage.setItem(PENDING_DELETE_KEY, JSON.stringify(pendingOrder));
  }

  // ---------- Helpers ----------
  function humanSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function setStatus(text, isError) {
    el.statusLine.textContent = text || "";
    el.statusLine.classList.toggle("error", !!isError);
  }

  function sanitizeName(name) {
    return name.replace(/[^A-Za-z0-9._\- ]/g, "_");
  }

  function arrayBufferToBase64(buffer) {
    var bytes = new Uint8Array(buffer);
    var chunkSize = 0x8000;
    var chunks = [];
    for (var i = 0; i < bytes.length; i += chunkSize) {
      chunks.push(String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize)));
    }
    return btoa(chunks.join(""));
  }

  function configured() {
    return !!(state.gh && state.gh.owner && state.gh.repo && state.gh.pat);
  }

  function updateDropzoneEnabled() {
    el.dropzone.classList.toggle("disabled", !configured());
  }

  // ---------- GitHub API ----------
  function apiUrl(path) {
    return "https://api.github.com/repos/" + state.gh.owner + "/" + state.gh.repo + "/contents/" + path;
  }
  function jsonHeaders() {
    return {
      Authorization: "token " + state.gh.pat,
      Accept: "application/vnd.github+json",
      "X-GitHub-Api-Version": API_VERSION
    };
  }

  function listFiles() {
    if (!configured()) { renderQueue(); return; }
    setSpinning(true);
    fetch(apiUrl(FILES_DIR), { headers: jsonHeaders() })
      .then(function (res) {
        if (res.status === 404) return [];
        if (!res.ok) throw new Error("List failed (" + res.status + ")");
        return res.json();
      })
      .then(function (items) {
        state.files = items
          .filter(function (i) { return i.type === "file"; })
          .map(function (i) { return { name: displayName(i.name), rawName: i.name, path: i.path, sha: i.sha, size: i.size }; })
          .sort(function (a, b) { return a.rawName < b.rawName ? -1 : 1; });
        var validPaths = {};
        state.files.forEach(function (f) { validPaths[f.path] = true; });
        var hadStale = false;
        Object.keys(pendingDelete).forEach(function (p) {
          if (!validPaths[p]) { delete pendingDelete[p]; hadStale = true; }
        });
        pendingOrder = pendingOrder.filter(function (p) { return validPaths[p]; });
        if (hadStale) savePendingDelete();
        setSpinning(false);
        setStatus("");
        renderQueue();
      })
      .catch(function (err) {
        setSpinning(false);
        setStatus("Couldn't load the queue: " + err.message, true);
      });
  }

  function displayName(rawName) {
    var idx = rawName.indexOf("__");
    return idx === -1 ? rawName : rawName.slice(idx + 2);
  }

  function uploadFile(file) {
    if (!configured()) { openSettings("Set up sync before sending a file."); return; }
    if (file.size > MAX_BYTES) {
      setStatus(file.name + " is over the 10MB limit.", true);
      return;
    }
    setStatus("Uploading " + file.name + "…");
    var reader = new FileReader();
    reader.onerror = function () { setStatus("Couldn't read " + file.name + ".", true); };
    reader.onload = function () {
      var b64 = arrayBufferToBase64(reader.result);
      var path = FILES_DIR + "/" + Date.now() + "__" + sanitizeName(file.name);
      fetch(apiUrl(path), {
        method: "PUT",
        headers: Object.assign({ "Content-Type": "application/json" }, jsonHeaders()),
        body: JSON.stringify({ message: "Transfer Portal upload: " + file.name, content: b64 })
      })
        .then(function (res) {
          if (!res.ok) throw new Error("Upload failed (" + res.status + ")");
          return res.json();
        })
        .then(function () {
          setStatus(file.name + " sent.");
          listFiles();
        })
        .catch(function (err) {
          setStatus("Couldn't send " + file.name + ": " + err.message, true);
        });
    };
    reader.readAsArrayBuffer(file);
  }

  function downloadFile(item, btn) {
    btn.disabled = true;
    btn.textContent = "…";
    fetch(apiUrl(item.path), {
      headers: {
        Authorization: "token " + state.gh.pat,
        Accept: "application/vnd.github.raw+json",
        "X-GitHub-Api-Version": API_VERSION
      }
    })
      .then(function (res) {
        if (!res.ok) throw new Error("Download failed (" + res.status + ")");
        return res.blob();
      })
      .then(function (blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = item.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus(item.name + " downloaded.");
        btn.disabled = false;
        btn.textContent = "Download";
      })
      .catch(function (err) {
        setStatus("Couldn't download " + item.name + ": " + err.message, true);
        btn.disabled = false;
        btn.textContent = "Download";
      });
  }

  function deleteFile(item) {
    return fetch(apiUrl(item.path), {
      method: "DELETE",
      headers: Object.assign({ "Content-Type": "application/json" }, jsonHeaders()),
      body: JSON.stringify({ message: "Transfer Portal delete: " + item.name, sha: item.sha })
    }).then(function (res) {
      if (!res.ok) throw new Error("Delete failed (" + res.status + ")");
    });
  }

  function markPendingDelete(path) {
    if (pendingDelete[path]) return;
    pendingDelete[path] = true;
    pendingOrder.push(path);
    savePendingDelete();
    renderQueue();
  }

  function cancelPendingDelete(path) {
    if (!pendingDelete[path]) return;
    delete pendingDelete[path];
    pendingOrder = pendingOrder.filter(function (p) { return p !== path; });
    savePendingDelete();
    renderQueue();
  }

  function confirmDeleteRow(item, btn) {
    btn.disabled = true;
    btn.textContent = "…";
    deleteFile(item)
      .then(function () {
        delete pendingDelete[item.path];
        pendingOrder = pendingOrder.filter(function (p) { return p !== item.path; });
        savePendingDelete();
        setStatus(item.name + " deleted.");
        listFiles();
      })
      .catch(function (err) {
        setStatus("Couldn't delete " + item.name + ": " + err.message, true);
        btn.disabled = false;
        btn.textContent = "Confirm Delete";
      });
  }

  function armDeleteAll() {
    if (state.files.length === 0) return;
    state.files.forEach(function (f) {
      if (!pendingDelete[f.path]) {
        pendingDelete[f.path] = true;
        pendingOrder.push(f.path);
      }
    });
    savePendingDelete();
    renderQueue();
  }

  function cancelDeleteAll() {
    pendingDelete = {};
    pendingOrder = [];
    savePendingDelete();
    renderQueue();
  }

  function confirmDeleteAll() {
    var targets = state.files.filter(function (f) { return pendingDelete[f.path]; });
    if (targets.length === 0) return;
    el.deleteAllBtn.disabled = true;
    el.deleteAllCancelBtn.disabled = true;
    setStatus("Deleting " + targets.length + (targets.length === 1 ? " file" : " files") + "…");
    Promise.all(targets.map(function (f) { return deleteFile(f); }))
      .then(function () {
        pendingDelete = {};
        pendingOrder = [];
        savePendingDelete();
        setStatus("Deleted.");
        listFiles();
      })
      .catch(function (err) {
        setStatus("Couldn't delete: " + err.message, true);
        listFiles();
      })
      .then(function () {
        el.deleteAllBtn.disabled = false;
        el.deleteAllCancelBtn.disabled = false;
      });
  }

  // ---------- Rendering ----------
  function setSpinning(on) {
    state.loading = on;
    el.refreshIcon.classList.toggle("spin", on);
  }

  function updateQueueLabel() {
    if (!configured() || state.files.length === 0) {
      el.queueLabel.textContent = "Waiting";
      return;
    }
    var count = state.files.length;
    var totalBytes = state.files.reduce(function (sum, f) { return sum + f.size; }, 0);
    el.queueLabel.textContent = count + (count === 1 ? " file" : " files") + " · " + humanSize(totalBytes) + " total";
  }

  function updateDeleteAllButton() {
    if (!configured() || state.files.length === 0) {
      el.deleteAllBtn.hidden = true;
      el.deleteAllCancelBtn.hidden = true;
      return;
    }
    el.deleteAllBtn.hidden = false;
    if (pendingOrder.length === 0) {
      el.deleteAllBtn.textContent = "Delete all";
      el.deleteAllCancelBtn.hidden = true;
    } else if (pendingOrder.length === state.files.length) {
      el.deleteAllBtn.textContent = "Confirm Delete All";
      el.deleteAllCancelBtn.hidden = false;
    } else {
      el.deleteAllBtn.textContent = "Delete selected";
      el.deleteAllCancelBtn.hidden = false;
    }
  }

  function orderedFilesForRender() {
    var normal = state.files.filter(function (f) { return !pendingDelete[f.path]; });
    var pending = pendingOrder
      .map(function (path) {
        var i;
        for (i = 0; i < state.files.length; i++) {
          if (state.files[i].path === path) return state.files[i];
        }
        return null;
      })
      .filter(function (f) { return f; });
    return normal.concat(pending);
  }

  function renderQueue() {
    el.queueList.innerHTML = "";
    updateQueueLabel();
    updateDeleteAllButton();
    if (!configured()) {
      var setup = document.createElement("div");
      setup.className = "empty-state";
      setup.textContent = "Set up sync to see what's waiting.";
      el.queueList.appendChild(setup);
      return;
    }
    if (state.files.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No files waiting.";
      el.queueList.appendChild(empty);
      return;
    }
    orderedFilesForRender().forEach(function (item) {
      el.queueList.appendChild(renderRow(item));
    });
  }

  function renderRow(item) {
    var row = document.createElement("div");
    row.className = "file-row";

    var icon = document.createElement("div");
    icon.className = "file-icon";
    icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>';
    row.appendChild(icon);

    var info = document.createElement("div");
    info.className = "file-info";
    var name = document.createElement("div");
    name.className = "file-name";
    name.textContent = item.name;
    var size = document.createElement("div");
    size.className = "file-size";
    size.textContent = humanSize(item.size);
    info.appendChild(name);
    info.appendChild(size);
    row.appendChild(info);

    var actions = document.createElement("div");
    actions.className = "file-actions";

    var isPending = !!pendingDelete[item.path];

    var btn = document.createElement("button");
    btn.className = "download-btn" + (isPending ? " confirm-delete" : "");
    btn.textContent = isPending ? "Confirm Delete" : "Download";
    btn.addEventListener("click", function () {
      if (isPending) { confirmDeleteRow(item, btn); } else { downloadFile(item, btn); }
    });
    actions.appendChild(btn);

    var delBtn = document.createElement("button");
    delBtn.className = "delete-btn" + (isPending ? " restore" : "");
    if (isPending) {
      delBtn.setAttribute("aria-label", "Restore " + item.name);
      delBtn.title = "Restore";
      delBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>';
      delBtn.addEventListener("click", function () { cancelPendingDelete(item.path); });
    } else {
      delBtn.setAttribute("aria-label", "Delete " + item.name);
      delBtn.title = "Delete";
      delBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
      delBtn.addEventListener("click", function () { markPendingDelete(item.path); });
    }
    actions.appendChild(delBtn);

    row.appendChild(actions);

    return row;
  }

  // ---------- Settings sheet ----------
  function openSettings(note) {
    el.ghOwner.value = state.gh ? state.gh.owner : "";
    el.ghRepo.value = state.gh ? state.gh.repo : "transfer-portal-data";
    el.ghPat.value = state.gh ? state.gh.pat : "";
    el.syncNote.textContent = note || "";
    el.syncNote.className = "sync-note";
    el.backdrop.hidden = false;
    el.settingsSheet.hidden = false;
  }
  function closeSettings() {
    el.backdrop.hidden = true;
    el.settingsSheet.hidden = true;
  }
  function saveSettings() {
    var owner = el.ghOwner.value.trim();
    var repo = el.ghRepo.value.trim() || "transfer-portal-data";
    var pat = el.ghPat.value.trim();
    if (!owner || !pat) {
      el.syncNote.textContent = "Owner and token are required.";
      el.syncNote.className = "sync-note error";
      return;
    }
    state.gh = { owner: owner, repo: repo, pat: pat };
    saveConfig();
    updateDropzoneEnabled();
    el.syncNote.textContent = "Checking connection…";
    el.syncNote.className = "sync-note";
    fetch(apiUrl(""), { headers: jsonHeaders() })
      .then(function (res) {
        if (res.status === 404) return; // empty repo, contents root not created yet — fine
        if (!res.ok) throw new Error("Check failed (" + res.status + ")");
      })
      .then(function () {
        closeSettings();
        setStatus("");
        listFiles();
      })
      .catch(function (err) {
        el.syncNote.textContent = "Saved, but couldn't verify: " + err.message;
        el.syncNote.className = "sync-note error";
      });
  }

  // ---------- Drag and drop ----------
  function handleFiles(fileList) {
    if (!fileList || fileList.length === 0) return;
    Array.prototype.forEach.call(fileList, uploadFile);
  }

  el.dropzone.addEventListener("click", function () {
    if (!configured()) { openSettings("Set up sync before sending a file."); return; }
    el.fileInput.click();
  });
  el.dropzone.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); el.dropzone.click(); }
  });
  el.dropzone.addEventListener("dragover", function (e) {
    e.preventDefault();
    if (configured()) el.dropzone.classList.add("dragover");
  });
  el.dropzone.addEventListener("dragleave", function () {
    el.dropzone.classList.remove("dragover");
  });
  el.dropzone.addEventListener("drop", function (e) {
    e.preventDefault();
    el.dropzone.classList.remove("dragover");
    if (!configured()) { openSettings("Set up sync before sending a file."); return; }
    handleFiles(e.dataTransfer.files);
  });
  el.fileInput.addEventListener("change", function () {
    handleFiles(el.fileInput.files);
    el.fileInput.value = "";
  });

  el.refreshBtn.addEventListener("click", function () {
    if (!configured()) { openSettings(); return; }
    listFiles();
  });
  el.deleteAllBtn.addEventListener("click", function () {
    if (pendingOrder.length === 0) { armDeleteAll(); } else { confirmDeleteAll(); }
  });
  el.deleteAllCancelBtn.addEventListener("click", cancelDeleteAll);

  el.settingsBtn.addEventListener("click", function () { openSettings(); });
  el.settingsClose.addEventListener("click", closeSettings);
  el.settingsCancel.addEventListener("click", closeSettings);
  el.settingsSave.addEventListener("click", saveSettings);
  el.backdrop.addEventListener("click", closeSettings);

  // ---------- Layout ----------
  function syncDownloadButtonWidth() {
    var probe = document.createElement("button");
    probe.className = "download-btn confirm-delete";
    probe.textContent = "Confirm Delete";
    probe.style.position = "absolute";
    probe.style.visibility = "hidden";
    probe.style.width = "auto";
    document.body.appendChild(probe);
    var width = probe.getBoundingClientRect().width;
    document.body.removeChild(probe);
    if (width > 0) {
      document.documentElement.style.setProperty("--download-btn-width", width + "px");
    }
  }

  // ---------- Init ----------
  syncDownloadButtonWidth();
  loadConfig();
  loadPendingDelete();
  updateDropzoneEnabled();
  renderQueue();
  if (configured()) {
    listFiles();
  } else {
    openSettings("Enter your GitHub details to start sending files.");
  }
})();
</script>
</body>
</html>
